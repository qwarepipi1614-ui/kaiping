<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qware 售票系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #e8f5f2;
  --table-bg: #d4ede8;
  --header-bg: #c2e0da;
  --cell-bg: #dff0ec;
  --blue: #3a5f8a;
  --blue-hover: #2d4d73;
  --pink: #e8789a;
  --pink-hover: #d4607e;
  --border: #a8cfc9;
  --text: #333;
  --shadow: 0 2px 8px rgba(0,0,0,0.12);
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
}

/* ── Top Nav ── */
.topnav {
  background: white;
  border-bottom: 2px solid var(--border);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow);
}

.topnav-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--blue);
}

.manage-btn {
  padding: 7px 18px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  transition: background 0.15s;
}
.manage-btn:hover { background: var(--blue-hover); }

/* ── Main Page ── */
#main-page { padding: 32px 20px 60px; }

.page-title {
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  color: #2a4a6a;
  margin-bottom: 8px;
}

.page-subtitle {
  text-align: center;
  font-size: 14px;
  color: #666;
  margin-bottom: 32px;
}

/* ── Portal Table ── */
.portal-table {
  max-width: 860px;
  margin: 0 auto;
  background: white;
  border: 2px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.portal-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.portal-header-cell {
  background: var(--header-bg);
  padding: 14px 20px;
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  color: #2a5a52;
  border-bottom: 2px solid var(--border);
}

.portal-header-cell:first-child {
  border-right: 2px solid var(--border);
}

.portal-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid var(--border);
  min-height: 70px;
}

.portal-row:last-child { border-bottom: none; }

.portal-cell {
  background: var(--cell-bg);
  padding: 14px 20px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.portal-cell:first-child {
  border-right: 2px solid var(--border);
  background: #e8f4f1;
}

/* ── System Buttons ── */
.sys-btn {
  display: inline-block;
  padding: 9px 18px;
  border-radius: 4px;
  font-size: 13.5px;
  font-weight: 500;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  border: none;
  text-decoration: none;
  text-align: center;
  transition: all 0.15s;
  line-height: 1.4;
}

.sys-btn.test {
  background: var(--blue);
  color: white;
  box-shadow: 0 2px 4px rgba(58,95,138,0.3);
}
.sys-btn.test:hover { background: var(--blue-hover); transform: translateY(-1px); box-shadow: 0 4px 8px rgba(58,95,138,0.4); }

.sys-btn.prod {
  background: var(--pink);
  color: white;
  box-shadow: 0 2px 4px rgba(232,120,154,0.3);
}
.sys-btn.prod:hover { background: var(--pink-hover); transform: translateY(-1px); box-shadow: 0 4px 8px rgba(232,120,154,0.4); }

/* ── Admin Page ── */
#admin-page { display: none; padding: 28px 20px 60px; max-width: 860px; margin: 0 auto; }

.admin-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ── Add Form ── */
.add-form {
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}

.form-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.form-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: flex-end;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
  min-width: 140px;
}

.form-group label {
  font-size: 12px;
  color: #666;
  font-weight: 500;
}

.form-group input, .form-group select {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  color: var(--text);
  background: white;
  transition: border-color 0.15s;
}

.form-group input:focus, .form-group select:focus {
  border-color: var(--blue);
}

.add-submit {
  padding: 8px 22px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 500;
  transition: background 0.15s;
  white-space: nowrap;
  align-self: flex-end;
  height: 36px;
}
.add-submit:hover { background: var(--blue-hover); }

/* ── Admin List ── */
.admin-section {
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}

.admin-section-header {
  padding: 12px 18px;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.admin-section-header.test { background: #dce8f5; color: var(--blue); }
.admin-section-header.prod { background: #fce8ef; color: #b0446a; }

.admin-item {
  display: flex;
  align-items: center;
  padding: 10px 18px;
  border-top: 1px solid #f0f0f0;
  gap: 10px;
  transition: background 0.12s;
}

.admin-item:hover { background: #f9f9f9; }

.item-env {
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}

.item-env.test { background: #dce8f5; color: var(--blue); }
.item-env.prod { background: #fce8ef; color: #b0446a; }

.item-name { font-size: 13.5px; font-weight: 500; min-width: 150px; }

.item-url {
  font-size: 12px;
  color: #888;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.item-actions { display: flex; gap: 6px; flex-shrink: 0; }

.icon-btn {
  width: 30px; height: 30px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}

.icon-btn.edit { background: #fff3e0; color: #e67e00; }
.icon-btn.edit:hover { background: #ffe0b2; }
.icon-btn.del  { background: #ffeaec; color: #d32f2f; }
.icon-btn.del:hover  { background: #ffcdd2; }
.icon-btn.up   { background: #e8f5e9; color: #388e3c; }
.icon-btn.up:hover   { background: #c8e6c9; }
.icon-btn.down { background: #e8f5e9; color: #388e3c; }
.icon-btn.down:hover { background: #c8e6c9; }

/* ── Edit inline ── */
.edit-row {
  background: #f5faff;
  padding: 10px 18px;
  border-top: 1px solid #dce8f5;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: flex-end;
}

.edit-row input, .edit-row select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
}

.edit-save { padding: 6px 16px; background: var(--blue); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; }
.edit-cancel { padding: 6px 16px; background: #eee; color: #555; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: #2a5a52;
  color: white;
  padding: 12px 20px;
  border-radius: 6px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

.back-btn {
  padding: 7px 18px;
  background: transparent;
  color: var(--blue);
  border: 1.5px solid var(--blue);
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.15s;
}
.back-btn:hover { background: var(--blue); color: white; }

.empty-hint {
  padding: 18px;
  text-align: center;
  color: #aaa;
  font-size: 13px;
}
</style>
</head>
<body>

<!-- Top Nav -->
<div class="topnav">
  <div class="topnav-title">🎫 Qware 售票系統入口</div>
  <div style="display:flex;gap:8px">
    <button class="back-btn" id="back-btn" style="display:none" onclick="showMain()">← 返回</button>
    <button class="manage-btn" id="manage-btn" onclick="showAdmin()">⚙ 管理系統</button>
  </div>
</div>

<!-- ══ MAIN PAGE ══ -->
<div id="main-page">
  <div class="page-title">Qware 售票系統</div>
  <div class="page-subtitle">請選擇您要進入的系統別</div>
  <div class="portal-table">
    <div class="portal-header">
      <div class="portal-header-cell">&lt;測試環境&gt;</div>
      <div class="portal-header-cell">&lt;正式環境&gt;</div>
    </div>
    <div id="portal-body"></div>
  </div>
</div>

<!-- ══ ADMIN PAGE ══ -->
<div id="admin-page">
  <div class="admin-title">⚙ 系統管理</div>

  <!-- Add Form -->
  <div class="add-form">
    <div class="form-title">➕ 新增系統</div>
    <div class="form-row">
      <div class="form-group">
        <label>環境</label>
        <select id="f-env">
          <option value="test">測試環境</option>
          <option value="prod">正式環境</option>
        </select>
      </div>
      <div class="form-group" style="min-width:200px">
        <label>系統名稱</label>
        <input type="text" id="f-name" placeholder="例：A系統後台">
      </div>
      <div class="form-group" style="flex:2;min-width:260px">
        <label>網址連結</label>
        <input type="text" id="f-url" placeholder="https://...">
      </div>
      <div class="form-group" style="min-width:130px">
        <label>所屬分組（列）</label>
        <input type="text" id="f-group" placeholder="例：A系統">
      </div>
      <button class="add-submit" onclick="addItem()">新增</button>
    </div>
  </div>

  <!-- List -->
  <div id="admin-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Default Data ──
const DEFAULT = [
  { id:1,  env:'test', group:'A系統',          name:'A系統後台',              url:'http://20.89.57.42/QWARE_TICKET_BACK/UTK2101_.aspx' },
  { id:2,  env:'test', group:'A系統',          name:'A系統 網頁核銷',         url:'http://20.89.57.42/QWARE_TICKET_BACK/UTK2106_.aspx' },
  { id:3,  env:'test', group:'D系統',          name:'D系統AWS(含抽籤)',        url:'https://ticket-uat.ibon.com.tw/backend/login' },
  { id:4,  env:'test', group:'E系統',          name:'E系統',                  url:'https://tour-uat.ibon.com.tw/login/admin?goto=/console/admin' },
  { id:5,  env:'test', group:'Q系統',          name:'Q系統',                  url:'https://manage-uat.ibon.com.tw/system/index.asp' },
  { id:6,  env:'test', group:'2.1G',           name:'2.1G後台',               url:'https://manage-uat.ibon.com.tw/Manage/Login.aspx' },
  { id:7,  env:'test', group:'ibon APP',       name:'ibon 售票 APP 管理後台', url:'https://appgroupbackend-uat.azurewebsites.net/login' },
  { id:8,  env:'test', group:'ibon售票',       name:'ibon售票系統',           url:'https://ticket-uat.ibon.com.tw/Web/' },
  { id:9,  env:'test', group:'空白票券',        name:'空白票券管理系統',        url:'http://10.35.82.104/TicketManage/' },
  { id:10, env:'prod', group:'A系統',          name:'A系統後台',              url:'http://20.78.17.220/QWARE_TICKET_BACK/UTK2101_.aspx' },
  { id:11, env:'prod', group:'A系統',          name:'A系統 歷史區後台',        url:'http://20.89.176.72/QWARE_TICKET_BACK/UTK2101_.aspx' },
  { id:12, env:'prod', group:'A系統',          name:'A系統 網頁核銷',         url:'https://20.78.17.220/QWARE_TICKET_BACK/UTK2106_.aspx' },
  { id:13, env:'prod', group:'D系統',          name:'D系統AWS(含抽籤)',        url:'https://ticket.ibon.com.tw/backend/login' },
  { id:14, env:'prod', group:'E系統',          name:'E系統',                  url:'https://tour.ibon.com.tw/login/admin?goto=/console/event/admin' },
  { id:15, env:'prod', group:'Q系統',          name:'Q系統',                  url:'https://manage.ibon.com.tw/system/' },
  { id:16, env:'prod', group:'2.1G',           name:'2.1G後台',               url:'https://manage.ibon.com.tw/Manage/Login.aspx' },
  { id:17, env:'prod', group:'ibon APP',       name:'ibon 售票 APP 管理後台', url:'https://appgroupbackend.azurewebsites.net/login' },
  { id:18, env:'prod', group:'ibon售票',       name:'ibon售票系統',           url:'https://ticket.ibon.com.tw/Web/' },
  { id:19, env:'prod', group:'空白票券',        name:'空白票券管理系統',        url:'https://manage.ibon.com.tw/Ticketmanage/tkLogin.aspx' },
];

let nextId = 20;

function load() {
  try {
    const s = localStorage.getItem('qware_items');
    if (s) {
      const d = JSON.parse(s);
      nextId = d.nextId || 20;
      return d.items;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT));
}

function save(items) {
  localStorage.setItem('qware_items', JSON.stringify({ items, nextId }));
}

let items = load();

// ── Helpers ──
function getGroups() {
  // Collect all unique groups in order they appear
  const groups = [];
  const seen = new Set();
  items.forEach(it => {
    if (!seen.has(it.group)) { seen.add(it.group); groups.push(it.group); }
  });
  return groups;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── MAIN PAGE ──
function renderMain() {
  const groups = getGroups();
  const body = document.getElementById('portal-body');
  body.innerHTML = '';

  groups.forEach(group => {
    const testItems = items.filter(it => it.env === 'test' && it.group === group);
    const prodItems = items.filter(it => it.env === 'prod' && it.group === group);
    if (!testItems.length && !prodItems.length) return;

    const row = document.createElement('div');
    row.className = 'portal-row';

    const testCell = document.createElement('div');
    testCell.className = 'portal-cell';
    testItems.forEach(it => {
      const btn = document.createElement('a');
      btn.className = 'sys-btn test';
      btn.textContent = it.name;
      btn.href = it.url;
      btn.target = '_blank';
      btn.rel = 'noopener';
      testCell.appendChild(btn);
    });
    if (!testItems.length) testCell.innerHTML = '<span style="color:#aaa;font-size:13px;">—</span>';

    const prodCell = document.createElement('div');
    prodCell.className = 'portal-cell';
    prodItems.forEach(it => {
      const btn = document.createElement('a');
      btn.className = 'sys-btn prod';
      btn.textContent = it.name;
      btn.href = it.url;
      btn.target = '_blank';
      btn.rel = 'noopener';
      prodCell.appendChild(btn);
    });
    if (!prodItems.length) prodCell.innerHTML = '<span style="color:#aaa;font-size:13px;">—</span>';

    row.appendChild(testCell);
    row.appendChild(prodCell);
    body.appendChild(row);
  });

  if (!groups.length) {
    body.innerHTML = '<div class="empty-hint">尚無系統，請前往管理頁面新增</div>';
  }
}

// ── ADMIN PAGE ──
function renderAdmin() {
  const container = document.getElementById('admin-list');
  container.innerHTML = '';

  // Test section
  const testItems = items.filter(it => it.env === 'test');
  const prodItems = items.filter(it => it.env === 'prod');

  [{ env:'test', label:'測試環境', list: testItems },
   { env:'prod', label:'正式環境', list: prodItems }].forEach(({ env, label, list }) => {
    const sec = document.createElement('div');
    sec.className = 'admin-section';

    const header = document.createElement('div');
    header.className = `admin-section-header ${env}`;
    header.innerHTML = `${env==='test'?'🔵':'🔴'} ${label}（${list.length} 個）`;
    sec.appendChild(header);

    if (!list.length) {
      sec.innerHTML += '<div class="empty-hint">尚無項目</div>';
    }

    list.forEach((it, idx) => {
      const row = document.createElement('div');
      row.id = `row-${it.id}`;

      const item = document.createElement('div');
      item.className = 'admin-item';
      item.innerHTML = `
        <span class="item-env ${it.env}">${it.env==='test'?'測試':'正式'}</span>
        <span class="item-name">${it.name}</span>
        <span class="item-url" title="${it.url}">${it.url}</span>
        <span style="font-size:12px;color:#aaa;min-width:60px">${it.group}</span>
        <div class="item-actions">
          <button class="icon-btn up" title="上移" onclick="moveItem(${it.id},-1)">↑</button>
          <button class="icon-btn down" title="下移" onclick="moveItem(${it.id},1)">↓</button>
          <button class="icon-btn edit" title="編輯" onclick="startEdit(${it.id})">✏️</button>
          <button class="icon-btn del" title="刪除" onclick="deleteItem(${it.id})">🗑</button>
        </div>
      `;
      row.appendChild(item);
      sec.appendChild(row);
    });

    container.appendChild(sec);
  });
}

function addItem() {
  const env  = document.getElementById('f-env').value;
  const name = document.getElementById('f-name').value.trim();
  const url  = document.getElementById('f-url').value.trim();
  const group= document.getElementById('f-group').value.trim();

  if (!name || !url || !group) { alert('請填寫所有欄位'); return; }

  items.push({ id: nextId++, env, name, url, group });
  save(items);
  renderAdmin();
  renderMain();
  showToast('✅ 已新增：' + name);

  document.getElementById('f-name').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('f-group').value = '';
}

function deleteItem(id) {
  const it = items.find(x => x.id === id);
  if (!confirm(`確定刪除「${it.name}」？`)) return;
  items = items.filter(x => x.id !== id);
  save(items);
  renderAdmin();
  renderMain();
  showToast('🗑 已刪除：' + it.name);
}

function moveItem(id, dir) {
  const env = items.find(x => x.id === id).env;
  const envItems = items.filter(x => x.env === env);
  const globalIdx = items.findIndex(x => x.id === id);
  const envIdx = envItems.findIndex(x => x.id === id);
  const targetEnvIdx = envIdx + dir;
  if (targetEnvIdx < 0 || targetEnvIdx >= envItems.length) return;
  const targetId = envItems[targetEnvIdx].id;
  const targetGlobalIdx = items.findIndex(x => x.id === targetId);
  [items[globalIdx], items[targetGlobalIdx]] = [items[targetGlobalIdx], items[globalIdx]];
  save(items);
  renderAdmin();
  renderMain();
}

function startEdit(id) {
  // Remove any existing edit rows
  document.querySelectorAll('.edit-row').forEach(e => e.remove());

  const it = items.find(x => x.id === id);
  const row = document.getElementById(`row-${id}`);

  const editDiv = document.createElement('div');
  editDiv.className = 'edit-row';
  editDiv.innerHTML = `
    <select id="e-env-${id}">
      <option value="test" ${it.env==='test'?'selected':''}>測試環境</option>
      <option value="prod" ${it.env==='prod'?'selected':''}>正式環境</option>
    </select>
    <input type="text" id="e-group-${id}" value="${it.group}" placeholder="分組" style="width:100px">
    <input type="text" id="e-name-${id}" value="${it.name}" placeholder="名稱" style="width:180px">
    <input type="text" id="e-url-${id}" value="${it.url}" placeholder="網址" style="flex:1;min-width:220px">
    <button class="edit-save" onclick="saveEdit(${id})">儲存</button>
    <button class="edit-cancel" onclick="cancelEdit()">取消</button>
  `;
  row.appendChild(editDiv);
}

function saveEdit(id) {
  const it = items.find(x => x.id === id);
  it.env   = document.getElementById(`e-env-${id}`).value;
  it.group = document.getElementById(`e-group-${id}`).value.trim();
  it.name  = document.getElementById(`e-name-${id}`).value.trim();
  it.url   = document.getElementById(`e-url-${id}`).value.trim();
  if (!it.name || !it.url || !it.group) { alert('請填寫所有欄位'); return; }
  save(items);
  renderAdmin();
  renderMain();
  showToast('✅ 已儲存');
}

function cancelEdit() {
  document.querySelectorAll('.edit-row').forEach(e => e.remove());
}

// ── Navigation ──
function showAdmin() {
  document.getElementById('main-page').style.display = 'none';
  document.getElementById('admin-page').style.display = 'block';
  document.getElementById('manage-btn').style.display = 'none';
  document.getElementById('back-btn').style.display = 'inline-block';
  renderAdmin();
}

function showMain() {
  document.getElementById('main-page').style.display = 'block';
  document.getElementById('admin-page').style.display = 'none';
  document.getElementById('manage-btn').style.display = 'inline-block';
  document.getElementById('back-btn').style.display = 'none';
}

// ── Init ──
renderMain();
</script>
</body>
</html>
